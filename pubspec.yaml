name: shared
description: "Shared services for all apps"
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  
  # Localization (Top 25 GDP countries)
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  
  # Monetization
  in_app_purchase: ^3.2.0
  google_mobile_ads: ^8.0.0
  
  # Storage
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
